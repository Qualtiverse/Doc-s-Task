name: Build Doc's Task

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows (MSYS2 MinGW)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-raylib
            mingw-w64-x86_64-ninja

      - name: Configure
        shell: msys2 {0}
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build
        shell: msys2 {0}
        run: cmake --build build

      - name: Verify
        shell: msys2 {0}
        run: |
          if [ -f build/DocTask.exe ]; then
            echo "SUCCESS!"
            ls -la build/DocTask.exe
          else
            echo "Executable not found"
            find build -name "*.exe" -type f
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocTask-Windows
          path: build/DocTask.exe
          retention-days: 30
