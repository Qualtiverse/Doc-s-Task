name: Build Doc's Task

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout DocTask
        uses: actions/checkout@v4

      - name: Checkout raylib
        uses: actions/checkout@v4
        with:
          repository: raysan5/raylib
          path: raylib-src
          ref: 5.5

      - name: Show directory structure
        run: |
          Write-Host "=== Workspace ==="
          Get-ChildItem
          Write-Host "=== raylib-src ==="
          if (Test-Path raylib-src) { Get-ChildItem raylib-src } else { Write-Error "raylib-src NOT FOUND" }
          Write-Host "=== CMake version ==="
          cmake --version

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release 2>&1
        continue-on-error: true

      - name: Show CMake error output
        if: failure()
        run: |
          if (Test-Path "build/CMakeFiles/CMakeOutput.log") { Get-Content "build/CMakeFiles/CMakeOutput.log" -Tail 30 }
          if (Test-Path "build/CMakeFiles/CMakeError.log") { Get-Content "build/CMakeFiles/CMakeError.log" -Tail 30 }
          Write-Host "Last error: $($Error[0])"

      - name: Build
        run: cmake --build build --config Release --parallel 2>&1
        continue-on-error: true

      - name: Verify
        run: |
          $exe = "build\Release\DocTask.exe"
          if (Test-Path $exe) {
            Write-Host "SUCCESS: $exe found"
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "Size: $('{0:N2}' -f $size) MB"
          } else {
            Write-Error "FAILED: executable not found"
            exit 1
          }

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DocTask-Windows
          path: build/Release/DocTask.exe
          retention-days: 30