name: Build Doc's Task (Windows)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Verify executable
        run: |
          $exe = "build\Release\DocTask.exe"
          if (Test-Path $exe) {
            Write-Host "Found: $exe"
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "Size: $('{0:N2}' -f $size) MB"
          } else {
            Write-Error "Executable not found at $exe"
            Get-ChildItem build -Recurse -Filter "*.exe" | Select-Object FullName, Length
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocTask-Windows
          path: build/Release/DocTask.exe
          retention-days: 30

  release:
    name: Create Release
    needs: build-windows
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: DocTask-Windows
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/DocTask.exe
          generate_release_notes: true