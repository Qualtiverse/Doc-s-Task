name: Build Doc's Task

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Download raylib binaries
        run: |
          $url = "https://github.com/raysan5/raylib/releases/download/5.5/raylib-5.5_win64_msvc16.zip"
          $zip = "$env:TEMP\raylib.zip"
          Write-Host "Downloading raylib..."
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath raylib-bin -Force
          $includeDir = Get-ChildItem raylib-bin -Recurse -Directory -Filter "include" | Select-Object -First 1
          Write-Host "Include: $($includeDir.FullName)"
          $libDir = Get-ChildItem raylib-bin -Recurse -Directory -Filter "lib" | Select-Object -First 1
          Write-Host "Lib: $($libDir.FullName)"
          Write-Host "RAYLIB_PATH=$($includeDir.Parent.FullName)" >> $env:GITHUB_ENV
          Get-ChildItem raylib-bin -Recurse

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Verify
        run: |
          $exe = "build\Release\DocTask.exe"
          if (Test-Path $exe) {
            Write-Host "SUCCESS: $exe"
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "Size: $('{0:N2}' -f $size) MB"
          } else {
            Write-Host "FAILED: executable not found - checking build output..."
            Get-ChildItem build -Recurse -Filter "*.exe" | Select-Object FullName, Length
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocTask-Windows
          path: build/Release/DocTask.exe
          retention-days: 30